name: CI

env:
  PIP_ROOT_USER_ACTION: ignore

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install (editable + dev)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint
        run: |
          ruff check app ml tests
          ruff format --check app ml tests
      - name: Test
        run: MLFLOW_DISABLE=1 pytest tests -v --tb=short

  wheel:
    runs-on: ubuntu-latest
    needs: lint-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Build wheel
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          python -m build --wheel
      - uses: actions/upload-artifact@v4
        with:
          name: python-wheel
          path: dist/*.whl
          retention-days: 30

  mlflow-train:
    runs-on: ubuntu-latest
    needs: lint-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Train + MLflow
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          export MLFLOW_TRACKING_URI="file://${{ github.workspace }}/mlruns"
          python -m ml.train --data data/sample_tv_shows.csv --out models
      - uses: actions/upload-artifact@v4
        with:
          name: mlflow-runs
          path: |
            mlruns
            models/metrics.json
            models/tmdb_rating_pipeline.joblib
          retention-days: 14
