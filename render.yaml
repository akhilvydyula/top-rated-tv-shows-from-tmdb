# Render Blueprint: https://render.com/docs/blueprint-spec
# Connect repo → New Blueprint → select this file, or create a Web Service manually
# with buildCommand: make install  and  startCommand: make start

services:
  - type: web
    name: tmdb-tv-shows
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: bash scripts/render-start.sh
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.11"
      - key: MODEL_PATH
        value: models/tmdb_rating_pipeline.joblib
