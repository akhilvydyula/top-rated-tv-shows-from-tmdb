stages:
  - lint
  - test
  - ml
  - deploy

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

cache:
  key: "$CI_COMMIT_REF_SLUG"
  paths:
    - .cache/pip

default:
  image: python:3.11-slim

.python_deps: &python_deps
  before_script:
    - python -m pip install --upgrade pip
    - pip install -e ".[dev]"

lint:
  stage: lint
  <<: *python_deps
  script:
    - ruff check app ml tests
    - ruff format --check app ml tests

test:
  stage: test
  <<: *python_deps
  script:
    - MLFLOW_DISABLE=1 pytest tests -v --tb=short

# Build installable wheel (artifact) for each pipeline.
wheel:
  stage: ml
  <<: *python_deps
  script:
    - python -m build --wheel
  artifacts:
    paths:
      - dist/*.whl
    expire_in: 30 days

# Train with MLflow file store and publish run artifacts (compare metrics across pushes).
mlflow_train:
  stage: ml
  <<: *python_deps
  script:
    - export MLFLOW_TRACKING_URI="file://${CI_PROJECT_DIR}/mlruns"
    - export MLFLOW_EXPERIMENT="tmdb-tv-rating-ci"
    - python -m ml.train --data data/sample_tv_shows.csv --out models
  artifacts:
    paths:
      - mlruns/
      - models/metrics.json
      - models/tmdb_rating_pipeline.joblib
    expire_in: 14 days

# CD: manual — Docker push (needs registry env + Docker runner).
deploy:
  stage: deploy
  image: docker:24-cli
  services:
    - docker:24-dind
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
  variables:
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - docker build -t "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA" -t "$CI_REGISTRY_IMAGE:latest" .
    - docker push "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA"
    - docker push "$CI_REGISTRY_IMAGE:latest"
